<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300"
     font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrowVec" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background panels -->
  <rect x="10" y="40" width="250" height="240" rx="12"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="310" y="40" width="250" height="240" rx="12"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="610" y="40" width="260" height="240" rx="12"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Panel titles -->
  <text x="135" y="28" text-anchor="middle"
        font-size="14" font-weight="bold" fill="#1E293B">
    Time Course RNA-seq
  </text>
  <text x="435" y="28" text-anchor="middle"
        font-size="14" font-weight="bold" fill="#1E293B">
    PCA Space
  </text>
  <text x="740" y="28" text-anchor="middle"
        font-size="14" font-weight="bold" fill="#1E293B">
    Maturation Score
  </text>

  <!-- Panel 1: Time course samples -->
  <!-- Timeline -->
  <line x1="50" y1="230" x2="230" y2="230"
        stroke="#94A3B8" stroke-width="2"/>
  <!-- Timepoint labels -->
  <text x="70" y="255" text-anchor="middle"
        font-size="11" fill="#64748B">Day 6</text>
  <text x="140" y="255" text-anchor="middle"
        font-size="11" fill="#64748B">Day 10</text>
  <text x="210" y="255" text-anchor="middle"
        font-size="11" fill="#64748B">Day 17</text>
  <!-- Timepoint marks -->
  <line x1="70" y1="225" x2="70" y2="235"
        stroke="#94A3B8" stroke-width="2"/>
  <line x1="140" y1="225" x2="140" y2="235"
        stroke="#94A3B8" stroke-width="2"/>
  <line x1="210" y1="225" x2="210" y2="235"
        stroke="#94A3B8" stroke-width="2"/>

  <!-- Control samples (blue) -->
  <circle cx="65" cy="130" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="75" cy="145" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="70" cy="115" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="135" cy="115" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="145" cy="130" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="140" cy="100" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="205" cy="90" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="215" cy="105" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="210" cy="75" r="8" fill="#3B82F6" opacity="0.8"/>

  <!-- Experimental samples (red) -->
  <circle cx="68" cy="165" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="78" cy="180" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="60" cy="178" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="138" cy="155" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="148" cy="170" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="130" cy="168" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="208" cy="140" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="218" cy="155" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="200" cy="150" r="8" fill="#EF4444" opacity="0.8"/>

  <!-- Legend for Panel 1 -->
  <circle cx="50" cy="67" r="6" fill="#3B82F6" opacity="0.8"/>
  <text x="62" y="71" font-size="11" fill="#334155">
    Control (D21)
  </text>
  <circle cx="160" cy="67" r="6" fill="#EF4444" opacity="0.8"/>
  <text x="172" y="71" font-size="11" fill="#334155">
    Trisomy (T21)
  </text>

  <!-- Connecting arrows between panels -->
  <line x1="268" y1="160" x2="302" y2="160"
        stroke="#6B7280" stroke-width="2"
        marker-end="url(#arrowRight)"/>
  <line x1="568" y1="160" x2="602" y2="160"
        stroke="#6B7280" stroke-width="2"
        marker-end="url(#arrowRight)"/>

  <!-- Panel 2: PCA space -->
  <!-- Axes -->
  <line x1="340" y1="250" x2="530" y2="250"
        stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="340" y1="250" x2="340" y2="70"
        stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="435" y="270" text-anchor="middle"
        font-size="10" fill="#94A3B8">PC1</text>
  <text x="330" y="160" text-anchor="middle"
        font-size="10" fill="#94A3B8"
        transform="rotate(-90, 330, 160)">PC2</text>

  <!-- Control cluster Day 6 (bottom-left) -->
  <circle cx="370" cy="220" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="380" cy="228" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="375" cy="212" r="6" fill="#3B82F6" opacity="0.7"/>
  <!-- Control cluster Day 10 (middle) -->
  <circle cx="430" cy="170" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="440" cy="178" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="435" cy="162" r="6" fill="#3B82F6" opacity="0.7"/>
  <!-- Control cluster Day 17 (top-right) -->
  <circle cx="500" cy="100" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="510" cy="108" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="505" cy="92" r="6" fill="#3B82F6" opacity="0.7"/>

  <!-- Reference vector (green arrow) -->
  <line x1="375" y1="220" x2="502" y2="102"
        stroke="#059669" stroke-width="2.5"
        stroke-dasharray="6,3"
        marker-end="url(#arrowVec)"/>
  <text x="460" y="145" font-size="10" fill="#059669"
        font-weight="bold" transform="rotate(-42, 460, 145)">
    reference vector
  </text>

  <!-- Experimental samples (red, slightly offset) -->
  <circle cx="385" cy="205" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="390" cy="215" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="378" cy="198" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="445" cy="160" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="452" cy="168" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="448" cy="152" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="490" cy="118" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="498" cy="126" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="485" cy="110" r="6" fill="#EF4444" opacity="0.7"/>

  <!-- Panel 3: Maturation score -->
  <!-- Score axis -->
  <line x1="660" y1="250" x2="660" y2="70"
        stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="660" y="268" text-anchor="middle"
        font-size="10" fill="#94A3B8">Timepoint</text>
  <text x="640" y="160" text-anchor="middle"
        font-size="10" fill="#94A3B8"
        transform="rotate(-90, 640, 160)">
    Maturation Score
  </text>

  <!-- Score = 0 and Score = 1 reference lines -->
  <line x1="655" y1="240" x2="840" y2="240"
        stroke="#CBD5E1" stroke-width="1"
        stroke-dasharray="4,4"/>
  <text x="848" y="244" font-size="9" fill="#94A3B8">0</text>
  <line x1="655" y1="90" x2="840" y2="90"
        stroke="#CBD5E1" stroke-width="1"
        stroke-dasharray="4,4"/>
  <text x="848" y="94" font-size="9" fill="#94A3B8">1</text>

  <!-- Control trajectory (blue line) -->
  <polyline points="700,235 750,165 800,95"
            fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <circle cx="700" cy="235" r="7" fill="#3B82F6"/>
  <circle cx="750" cy="165" r="7" fill="#3B82F6"/>
  <circle cx="800" cy="95" r="7" fill="#3B82F6"/>

  <!-- Experimental trajectory (red line, slightly ahead) -->
  <polyline points="700,220 750,160 800,110"
            fill="none" stroke="#EF4444" stroke-width="2.5"
            stroke-dasharray="6,3"/>
  <circle cx="700" cy="220" r="7" fill="#EF4444"/>
  <circle cx="750" cy="160" r="7" fill="#EF4444"/>
  <circle cx="800" cy="110" r="7" fill="#EF4444"/>

  <!-- Timepoint labels -->
  <text x="700" y="258" text-anchor="middle"
        font-size="10" fill="#64748B">D6</text>
  <text x="750" y="258" text-anchor="middle"
        font-size="10" fill="#64748B">D10</text>
  <text x="800" y="258" text-anchor="middle"
        font-size="10" fill="#64748B">D17</text>
</svg>
