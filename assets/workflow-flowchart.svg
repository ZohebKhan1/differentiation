<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340"
     font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="20" y="12" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="36" text-anchor="middle"
        font-size="11" fill="#000">
    1. Subset to Reference Samples
  </text>

  <!-- Arrow -->
  <line x1="145" y1="50" x2="145" y2="64"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 2 -->
  <rect x="20" y="66" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="82" text-anchor="middle"
        font-size="11" fill="#000">
    2. DESeq2 LRT: Identify
  </text>
  <text x="145" y="96" text-anchor="middle"
        font-size="11" fill="#000">
    Temporally Variable Genes
  </text>

  <!-- Arrow -->
  <line x1="145" y1="104" x2="145" y2="118"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 3 -->
  <rect x="20" y="120" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="136" text-anchor="middle"
        font-size="11" fill="#000">
    3. PCA on Reference Samples
  </text>
  <text x="145" y="150" text-anchor="middle"
        font-size="11" fill="#000">
    in Temporal Gene Space
  </text>

  <!-- Arrow -->
  <line x1="145" y1="158" x2="145" y2="172"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 4 -->
  <rect x="20" y="174" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="198" text-anchor="middle"
        font-size="11" fill="#000">
    4. Define Differentiation Trajectory
  </text>

  <!-- Arrow -->
  <line x1="145" y1="212" x2="145" y2="226"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 5 -->
  <rect x="20" y="228" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="252" text-anchor="middle"
        font-size="11" fill="#000">
    5. Project All Samples onto Trajectory
  </text>

  <!-- Arrow -->
  <line x1="145" y1="266" x2="145" y2="280"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 6 -->
  <rect x="20" y="282" width="250" height="38" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="145" y="306" text-anchor="middle"
        font-size="11" fill="#000">
    6. Normalize Maturation Score
  </text>

  <!-- Bracket: Identifying time-dependent
       gene expression (steps 1-2) -->
  <path d="M 285,12 L 295,12 L 295,104 L 285,104"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="305" y="50" font-size="10"
        font-weight="600" fill="#000">
    <tspan x="305" dy="0">Identifying</tspan>
    <tspan x="305" dy="13">time-dependent</tspan>
    <tspan x="305" dy="13">gene expression</tspan>
  </text>

  <!-- Bracket: Defining differentiation axis
       (steps 3-4) -->
  <path d="M 285,120 L 295,120 L 295,212 L 285,212"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="305" y="158" font-size="10"
        font-weight="600" fill="#000">
    <tspan x="305" dy="0">Defining</tspan>
    <tspan x="305" dy="13">differentiation</tspan>
    <tspan x="305" dy="13">axis</tspan>
  </text>

  <!-- Bracket: Scoring maturity (steps 5-6) -->
  <path d="M 285,228 L 295,228 L 295,320 L 285,320"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="305" y="266" font-size="10"
        font-weight="600" fill="#000">
    <tspan x="305" dy="0">Scoring</tspan>
    <tspan x="305" dy="13">maturity</tspan>
  </text>
</svg>
