<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 620"
     font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Phase labels (left side) -->
  <text x="8" y="58" font-size="9" fill="#94A3B8"
        font-weight="bold"
        transform="rotate(-90, 8, 58)">DATA</text>
  <text x="8" y="230" font-size="9" fill="#94A3B8"
        font-weight="bold"
        transform="rotate(-90, 8, 230)">GENES</text>
  <text x="8" y="398" font-size="9" fill="#94A3B8"
        font-weight="bold"
        transform="rotate(-90, 8, 398)">TRAJECTORY</text>
  <text x="8" y="568" font-size="9" fill="#94A3B8"
        font-weight="bold"
        transform="rotate(-90, 8, 568)">SCORE</text>

  <!-- Step 1: Load Count Matrix -->
  <rect x="30" y="15" width="260" height="44" rx="8"
        fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="33" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#1E40AF">
    1. Load Count Matrix
  </text>
  <text x="160" y="48" text-anchor="middle"
        font-size="10" fill="#3B82F6">
    RNA-seq gene expression data
  </text>

  <!-- Arrow 1 -->
  <line x1="160" y1="59" x2="160" y2="80"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 2: Filter to Control -->
  <rect x="30" y="84" width="260" height="44" rx="8"
        fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="102" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#1E40AF">
    2. Subset Control Samples
  </text>
  <text x="160" y="117" text-anchor="middle"
        font-size="10" fill="#3B82F6">
    D21 samples across timepoints
  </text>

  <!-- Arrow 2 -->
  <line x1="160" y1="128" x2="160" y2="149"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 3: DESeq2 LRT -->
  <rect x="30" y="153" width="260" height="44" rx="8"
        fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="160" y="171" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#166534">
    3. DESeq2 Likelihood Ratio Test
  </text>
  <text x="160" y="186" text-anchor="middle"
        font-size="10" fill="#22C55E">
    Full: ~ timepoint | Reduced: ~ 1
  </text>

  <!-- Arrow 3 -->
  <line x1="160" y1="197" x2="160" y2="218"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 4: Select Temporal Genes -->
  <rect x="30" y="222" width="260" height="44" rx="8"
        fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="160" y="240" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#166534">
    4. Temporally Variable Genes
  </text>
  <text x="160" y="255" text-anchor="middle"
        font-size="10" fill="#22C55E">
    Filter by adjusted p-value
  </text>

  <!-- Arrow 4 -->
  <line x1="160" y1="266" x2="160" y2="287"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 5: VST + PCA -->
  <rect x="30" y="291" width="260" height="44" rx="8"
        fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="160" y="309" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#6B21A8">
    5. VST Normalization + PCA
  </text>
  <text x="160" y="324" text-anchor="middle"
        font-size="10" fill="#A855F7">
    Control samples define PC space
  </text>

  <!-- Arrow 5 -->
  <line x1="160" y1="335" x2="160" y2="356"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 6: Reference Vector -->
  <rect x="30" y="360" width="260" height="44" rx="8"
        fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="160" y="378" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#6B21A8">
    6. Define Reference Vector
  </text>
  <text x="160" y="393" text-anchor="middle"
        font-size="10" fill="#A855F7">
    Centroid Day 6 to Centroid Day 17
  </text>

  <!-- Arrow 6 -->
  <line x1="160" y1="404" x2="160" y2="425"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 7: Project -->
  <rect x="30" y="429" width="260" height="44" rx="8"
        fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="160" y="447" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#92400E">
    7. Project All Samples
  </text>
  <text x="160" y="462" text-anchor="middle"
        font-size="10" fill="#F59E0B">
    Onto reference vector in PC space
  </text>

  <!-- Arrow 7 -->
  <line x1="160" y1="473" x2="160" y2="494"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 8: Maturation Score -->
  <rect x="30" y="498" width="260" height="44" rx="8"
        fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="160" y="516" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#92400E">
    8. Compute Maturation Score
  </text>
  <text x="160" y="531" text-anchor="middle"
        font-size="10" fill="#F59E0B">
    Normalized scalar: 0 (early) to 1 (late)
  </text>

  <!-- Arrow 8 -->
  <line x1="160" y1="542" x2="160" y2="563"
        stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#flowArrow)"/>

  <!-- Step 9: Compare -->
  <rect x="30" y="567" width="260" height="40" rx="8"
        fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="160" y="591" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#991B1B">
    Compare Control vs Experimental
  </text>
</svg>
